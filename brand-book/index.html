<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>WICKLE 品牌手册</title>
    <meta name="description" content="WICKLE 品牌手册在线阅读" />
    <link rel="preload" as="image" href="./pages/page-01.jpg" fetchpriority="high" />
    <style>
      :root {
        color-scheme: light;
        --paper: #f5f0e5;
        --ink: #4d4d52;
        --line: rgba(88, 83, 74, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--paper);
        overscroll-behavior: none;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .reader {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        margin: 0 auto;
        padding: max(14px, env(safe-area-inset-top)) 0 max(14px, env(safe-area-inset-bottom));
      }

      .reader-bar {
        position: relative;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 8px 14px 10px;
        background: rgba(245, 240, 229, 0.9);
        backdrop-filter: blur(10px);
      }

      .reader-title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .reader-count {
        flex: 0 0 auto;
        min-width: 56px;
        text-align: right;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        color: rgba(77, 77, 82, 0.72);
      }

      .progress {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10;
        width: 100%;
        height: 3px;
        background: rgba(90, 82, 68, 0.12);
      }

      .progress span {
        display: block;
        width: calc(100% / 41);
        height: 100%;
        background: #62bec4;
        transition: width 180ms ease;
      }

      .pages {
        display: flex;
        width: 100%;
        min-width: 0;
        min-height: 0;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-behavior: smooth;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pinch-zoom;
      }

      .pages::-webkit-scrollbar {
        display: none;
      }

      .page {
        position: relative;
        display: grid;
        flex: 0 0 100%;
        place-items: center;
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 10px 10px 20px;
        scroll-snap-align: center;
        scroll-snap-stop: always;
      }

      .page img {
        display: block;
        width: min(100%, 980px);
        height: auto;
        max-height: 100%;
        border-radius: 7px;
        object-fit: contain;
        background: #fff;
        box-shadow: 0 14px 34px rgba(77, 68, 52, 0.12);
      }

      .page::after {
        content: attr(data-page);
        position: absolute;
        right: 8px;
        bottom: 7px;
        padding: 3px 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: rgba(77, 77, 82, 0.62);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }

      .nav-btn {
        position: fixed;
        top: 50%;
        z-index: 6;
        width: 42px;
        height: 72px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.38);
        transform: translateY(-50%);
        backdrop-filter: blur(10px);
        opacity: 0.72;
      }

      .nav-btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 13px;
        height: 13px;
        border-top: 2px solid rgba(77, 77, 82, 0.76);
        border-left: 2px solid rgba(77, 77, 82, 0.76);
      }

      .nav-prev {
        left: max(10px, env(safe-area-inset-left));
      }

      .nav-next {
        right: max(10px, env(safe-area-inset-right));
      }

      .nav-prev::before {
        transform: translate(-34%, -50%) rotate(-45deg);
      }

      .nav-next::before {
        transform: translate(-66%, -50%) rotate(135deg);
      }

      .nav-btn:disabled {
        opacity: 0.18;
      }

      @media (hover: none) and (pointer: coarse) {
        .nav-btn {
          width: 32px;
          height: 58px;
          background: rgba(255, 255, 255, 0.26);
        }
      }

      @media (min-width: 720px) {
        .reader-title {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div class="progress" aria-hidden="true"><span id="progressFill"></span></div>
    <main class="reader" aria-label="WICKLE 品牌手册在线阅读">
      <header class="reader-bar">
        <h1 class="reader-title">WICKLE 品牌手册</h1>
        <div class="reader-count"><span id="currentPage">1</span>/41</div>
      </header>
      <section class="pages" id="pages"></section>
      <button class="nav-btn nav-prev" id="prevBtn" type="button" aria-label="上一页"></button>
      <button class="nav-btn nav-next" id="nextBtn" type="button" aria-label="下一页"></button>
    </main>

    <script>
      const pageTotal = 41;
      const pages = document.getElementById("pages");
      const currentPage = document.getElementById("currentPage");
      const progressFill = document.getElementById("progressFill");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const imagePath = (index) => `./pages/page-${String(index).padStart(2, "0")}.jpg`;
      let activeIndex = 0;
      let scrollFrame = 0;
      let touchStartX = 0;
      let touchStartY = 0;

      for (let index = 1; index <= pageTotal; index += 1) {
        const figure = document.createElement("figure");
        const image = document.createElement("img");
        figure.className = "page";
        figure.dataset.page = index;
        if (index <= 2) {
          image.src = imagePath(index);
        } else {
          image.dataset.src = imagePath(index);
        }
        image.alt = `WICKLE 品牌手册第 ${index} 页`;
        image.width = 1280;
        image.height = 720;
        image.decoding = "async";
        image.loading = index <= 2 ? "eager" : "lazy";
        if (index === 1) image.fetchPriority = "high";
        figure.appendChild(image);
        pages.appendChild(figure);
      }

      const loadImage = (image) => {
        if (!image.dataset.src) return;
        image.src = image.dataset.src;
        image.removeAttribute("data-src");
      };

      const pageElements = Array.from(document.querySelectorAll(".page"));

      const loadAround = (index) => {
        for (let offset = -1; offset <= 2; offset += 1) {
          const page = pageElements[index + offset];
          if (!page) continue;
          loadImage(page.querySelector("img"));
        }
      };

      const setActive = (index) => {
        activeIndex = Math.max(0, Math.min(pageTotal - 1, index));
        currentPage.textContent = activeIndex + 1;
        progressFill.style.width = `${((activeIndex + 1) / pageTotal) * 100}%`;
        prevBtn.disabled = activeIndex === 0;
        nextBtn.disabled = activeIndex === pageTotal - 1;
        loadAround(activeIndex);
      };

      const goTo = (index) => {
        const target = Math.max(0, Math.min(pageTotal - 1, index));
        pages.scrollTo({ left: target * pages.clientWidth, behavior: "smooth" });
        setActive(target);
      };

      pages.addEventListener("scroll", () => {
        if (scrollFrame) return;
        scrollFrame = window.requestAnimationFrame(() => {
          scrollFrame = 0;
          const index = Math.round(pages.scrollLeft / pages.clientWidth);
          if (index !== activeIndex) setActive(index);
        });
      });

      pages.addEventListener(
        "touchstart",
        (event) => {
          const touch = event.changedTouches[0];
          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
        },
        { passive: true },
      );

      pages.addEventListener(
        "touchend",
        (event) => {
          const touch = event.changedTouches[0];
          const deltaX = touch.clientX - touchStartX;
          const deltaY = touch.clientY - touchStartY;
          if (Math.abs(deltaX) < 38 || Math.abs(deltaX) < Math.abs(deltaY) * 1.2) return;
          goTo(activeIndex + (deltaX < 0 ? 1 : -1));
        },
        { passive: true },
      );

      prevBtn.addEventListener("click", () => goTo(activeIndex - 1));
      nextBtn.addEventListener("click", () => goTo(activeIndex + 1));

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") goTo(activeIndex - 1);
        if (event.key === "ArrowRight") goTo(activeIndex + 1);
      });

      window.addEventListener("resize", () => {
        pages.scrollTo({ left: activeIndex * pages.clientWidth, behavior: "auto" });
      });

      setActive(0);
    </script>
  </body>
</html>
