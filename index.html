<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WICKLE H5</title>
    <link rel="preload" as="image" href="./assets/mobile/1.jpg" fetchpriority="high" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="h5" aria-label="WICKLE mobile page viewer">
      <section class="slides" id="slides">
        <article class="slide is-active" data-index="0">
          <img class="slide-bg" src="./assets/mobile/1.jpg" data-src="./assets/mobile/1.jpg" alt="" aria-hidden="true" loading="eager" decoding="async" />
          <img class="slide-img" src="./assets/mobile/1.jpg" data-src="./assets/mobile/1.jpg" alt="WICKLE 品牌首页" draggable="false" loading="eager" decoding="async" fetchpriority="high" />
        </article>
        <article class="slide" data-index="1">
          <img class="slide-bg" data-src="./assets/mobile/2.jpg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
          <img class="slide-img" data-src="./assets/mobile/2.jpg" alt="新生家庭安心首选" draggable="false" loading="lazy" decoding="async" />
        </article>
        <article class="slide" data-index="2">
          <img class="slide-bg" data-src="./assets/mobile/3.jpg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
          <img class="slide-img" data-src="./assets/mobile/3.jpg" alt="贴身倍护系列与夏日轻防晒系列" draggable="false" loading="lazy" decoding="async" />
        </article>
        <article class="slide" data-index="3">
          <img class="slide-bg" data-src="./assets/mobile/4.jpg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
          <img class="slide-img" data-src="./assets/mobile/4.jpg" alt="品牌销量与认证" draggable="false" loading="lazy" decoding="async" />
        </article>
        <article class="slide" data-index="4">
          <img class="slide-bg" data-src="./assets/mobile/5.jpg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
          <img class="slide-img" data-src="./assets/mobile/5.jpg" alt="身体润护系列与面部特护系列" draggable="false" loading="lazy" decoding="async" />
        </article>
        <article class="slide" data-index="5">
          <img class="slide-bg" data-src="./assets/mobile/6.jpg" alt="" aria-hidden="true" loading="lazy" decoding="async" />
          <img class="slide-img" data-src="./assets/mobile/6.jpg" alt="WICKLE 官方渠道" draggable="false" loading="lazy" decoding="async" />
        </article>
      </section>

      <div class="page-count" aria-live="polite"><span id="currentPage">1</span>/6</div>
      <div class="dots" id="dots" aria-hidden="true"></div>
      <button class="nav-btn nav-prev" id="prevBtn" type="button" aria-label="上一页"></button>
      <button class="nav-btn nav-next" id="nextBtn" type="button" aria-label="下一页"></button>
      <div class="swipe-tip" id="swipeTip" aria-hidden="true">
        <span></span>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
